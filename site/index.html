<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日早报</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a0f1c 0%, #1a1f2e 100%);
            color: #e8ecf1;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            padding: 40px 0 30px;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 2.8rem;
            background: linear-gradient(135deg, #60a5fa, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
            font-weight: 700;
        }
        .header .date {
            color: #6b7280;
            font-size: 1.1rem;
            letter-spacing: 2px;
        }
        .dashboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        .card {
            background: rgba(20, 25, 40, 0.7);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
        }
        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #f3f4f6;
        }
        /* 今日天气 */
        .weather-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .weather-item {
            background: rgba(15, 20, 35, 0.6);
            padding: 18px 10px;
            border-radius: 12px;
            text-align: center;
        }
        .weather-city {
            font-size: 0.8rem;
            color: #6b7280;
            margin-bottom: 10px;
            line-height: 1.3;
        }
        .weather-temp {
            font-size: 1.8rem;
            font-weight: 700;
            color: #60a5fa;
        }
        .weather-range {
            font-size: 0.75rem;
            color: #4b5563;
            margin-top: 6px;
        }
        /* 全球指数 */
        .indices-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            background: rgba(0,0,0,0.2);
            padding: 4px;
            border-radius: 10px;
        }
        .tab-btn {
            padding: 6px 12px;
            border-radius: 8px;
            background: transparent;
            border: none;
            color: #6b7280;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
        }
        .tab-btn.active {
            background: rgba(96, 165, 250, 0.2);
            color: #60a5fa;
        }
        /* 股票列表 */
        .stock-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .stock-item {
            background: rgba(15, 20, 35, 0.5);
            padding: 14px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .stock-info {
            flex: 1;
            min-width: 0;
        }
        .stock-symbol {
            font-weight: 600;
            font-size: 0.95rem;
            color: #f3f4f6;
        }
        .stock-name {
            font-size: 0.75rem;
            color: #4b5563;
        }
        .stock-sparkline {
            width: 60px;
            height: 24px;
        }
        .stock-sparkline svg {
            width: 100%;
            height: 100%;
        }
        .stock-price {
            text-align: right;
            min-width: 70px;
        }
        .stock-value {
            font-size: 1rem;
            font-weight: 600;
            color: #f3f4f6;
        }
        .stock-change {
            font-size: 0.8rem;
            font-weight: 500;
        }
        .stock-change.up { color: #34d399; }
        .stock-change.down { color: #f87171; }
        /* 市场板块 */
        .sector-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .sector-box {
            background: rgba(15, 20, 35, 0.5);
            padding: 14px;
            border-radius: 10px;
        }
        .sector-title {
            font-size: 0.85rem;
            color: #6b7280;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .sector-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .sector-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }
        .sector-name {
            color: #e5e7eb;
        }
        .sector-change {
            font-weight: 500;
        }
        .sector-change.up { color: #34d399; }
        .sector-change.down { color: #f87171; }
        /* 热榜 */
        .news-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .news-item {
            padding: 12px 14px;
            background: rgba(15, 20, 35, 0.5);
            border-radius: 10px;
            border-left: 2px solid #60a5fa;
        }
        .news-title {
            font-size: 0.9rem;
            line-height: 1.5;
            display: flex;
            gap: 10px;
        }
        .news-title a {
            color: #e5e7eb;
            text-decoration: none;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .news-title a:hover {
            color: #60a5fa;
        }
        .news-rank {
            flex-shrink: 0;
            width: 20px;
            height: 20px;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            border-radius: 4px;
            text-align: center;
            line-height: 20px;
            font-size: 0.7rem;
            font-weight: 700;
        }
        .news-meta {
            font-size: 0.75rem;
            color: #4b5563;
            margin-top: 8px;
            margin-left: 30px;
        }
        /* 涨幅榜 */
        .gainer-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .gainer-item {
            display: flex;
            align-items: center;
            padding: 10px 14px;
            background: rgba(15, 20, 35, 0.5);
            border-radius: 10px;
        }
        .gainer-rank {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
            margin-right: 12px;
        }
        .gainer-rank.top3 {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #0f172a;
        }
        .gainer-rank.normal {
            background: rgba(255, 255, 255, 0.08);
            color: #6b7280;
        }
        .gainer-info {
            flex: 1;
            min-width: 0;
        }
        .gainer-name {
            font-weight: 600;
            font-size: 0.9rem;
            color: #f3f4f6;
        }
        .gainer-symbol {
            font-size: 0.75rem;
            color: #4b5563;
        }
        .gainer-change {
            font-size: 0.95rem;
            font-weight: 700;
            color: #34d399;
        }
        /* 其他 */
        .loading {
            text-align: center;
            padding: 60px;
            color: #4b5563;
        }
        .error {
            background: rgba(220, 38, 38, 0.15);
            color: #f87171;
            padding: 14px;
            border-radius: 10px;
            text-align: center;
            font-size: 0.9rem;
        }
        .source-badge {
            color: #4b5563;
            font-size: 0.75rem;
            margin-left: 8px;
            font-weight: 400;
        }
        .footer {
            text-align: center;
            padding: 40px 0 20px;
            color: #4b5563;
            font-size: 0.85rem;
        }
        @media (max-width: 1200px) {
            .dashboard {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
            .weather-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 每日早报</h1>
            <div class="date" id="date">加载中...</div>
        </div>
        
        <div id="content">
            <div class="loading">正在加载数据...</div>
        </div>
        
        <div class="footer">
            数据来源：Open-Meteo · Yahoo Finance · NewsAPI<br>
            每日自动生成 · <span id="generated"></span>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('data.json?t=' + Date.now());
                const data = await response.json();
                render(data);
            } catch (err) {
                document.getElementById('content').innerHTML = 
                    `<div class="error">加载失败: ${err.message}</div>`;
            }
        }

        function render(data) {
            document.getElementById('date').textContent = data.date;
            document.getElementById('generated').textContent = 
                new Date(data.generated_at).toLocaleString('zh-CN');

            document.getElementById('content').innerHTML = `
                <div class="dashboard">
                    ${renderWeather(data.weather)}
                    ${renderGlobalIndices(data.global_indices)}
                    ${renderNews(data.news)}
                    ${renderMarketSectors(data.market_sectors)}
                    ${renderTopGainers(data.top_gainers)}
                </div>
            `;
        }

        function renderWeather(weather) {
            const items = weather.map(w => `
                <div class="weather-item">
                    <div class="weather-city">${w.city}</div>
                    <div class="weather-temp">${w.current.temp}°</div>
                    <div class="weather-range">${w.today.min}° / ${w.today.max}°</div>
                </div>
            `).join('');

            return `
                <div class="card">
                    <div class="card-title">🌤️ 今日天气</div>
                    <div class="weather-grid">${items}</div>
                </div>
            `;
        }

        function renderGlobalIndices(indices) {
            const regions = Object.keys(indices);
            const tabs = regions.map((r, i) => 
                `<button class="tab-btn ${i === 0 ? 'active' : ''}" onclick="switchTab('${r}')">${r}</button>`
            ).join('');

            const content = regions.map(region => {
                const stocks = indices[region] || [];
                const items = stocks.map(s => renderStockItem(s)).join('');
                return `<div class="tab-content" id="tab-${region}" style="${region === regions[0] ? '' : 'display:none'}">${items}</div>`;
            }).join('');

            return `
                <div class="card">
                    <div class="card-title">🌍 全球指数</div>
                    <div class="indices-tabs">${tabs}</div>
                    <div class="stock-grid">${content}</div>
                </div>
            `;
        }

        function renderMarketSectors(sectors) {
            const items = Object.entries(sectors).map(([name, stocks]) => `
                <div class="sector-box">
                    <div class="sector-title">${name}</div>
                    <div class="sector-list">
                        ${stocks.map(s => `
                            <div class="sector-item">
                                <span class="sector-name">${s.name}</span>
                                <span class="sector-change ${s.change >= 0 ? 'up' : 'down'}">${s.change >= 0 ? '+' : ''}${s.change}%</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');

            return `
                <div class="card">
                    <div class="card-title">📈 市场板块</div>
                    <div class="sector-grid">${items}</div>
                </div>
            `;
        }

        function renderTopGainers(gainers) {
            const sorted = [...gainers].sort((a, b) => b.change - a.change).slice(0, 10);
            const items = sorted.map((g, i) => `
                <div class="gainer-item">
                    <div class="gainer-rank ${i < 3 ? 'top3' : 'normal'}">${i + 1}</div>
                    <div class="gainer-info">
                        <div class="gainer-name">${g.name}</div>
                        <div class="gainer-symbol">${g.symbol}</div>
                    </div>
                    <div class="gainer-change">+${g.change}%</div>
                </div>
            `).join('');

            return `
                <div class="card">
                    <div class="card-title">🔥 涨幅榜 <span style="color:#4b5563;font-size:0.8rem">Top 10</span></div>
                    <div class="gainer-list">${items}</div>
                </div>
            `;
        }

        function renderNews(news) {
            if (news.error) {
                return `
                    <div class="card">
                        <div class="card-title">📰 热榜</div>
                        <div class="error">${news.error}</div>
                    </div>
                `;
            }

            const badge = news.source ? `<span class="source-badge">${news.source}</span>` : '';
            const items = news.articles.slice(0, 8).map((a, i) => `
                <div class="news-item">
                    <div class="news-title">
                        <span class="news-rank">${i + 1}</span>
                        <a href="${a.url}" target="_blank">${a.title}</a>
                    </div>
                    <div class="news-meta">${a.source} · ${a.published}</div>
                </div>
            `).join('');

            return `
                <div class="card">
                    <div class="card-title">📰 热榜${badge}</div>
                    <div class="news-list">${items}</div>
                </div>
            `;
        }

        function renderStockItem(s) {
            const changeClass = s.change >= 0 ? 'up' : 'down';
            const changeSign = s.change >= 0 ? '+' : '';
            const sparkline = s.sparkline ? renderSparkline(s.sparkline, s.change >= 0) : '';
            
            return `
                <div class="stock-item">
                    <div class="stock-info">
                        <div class="stock-symbol">${s.symbol}</div>
                        <div class="stock-name">${s.name}</div>
                    </div>
                    ${sparkline}
                    <div class="stock-price">
                        <div class="stock-value">${s.price}</div>
                        <div class="stock-change ${changeClass}">${changeSign}${s.change}%</div>
                    </div>
                </div>
            `;
        }

        function renderSparkline(data, isUp) {
            if (!data || data.length < 2) return '';
            
            const width = 60, height = 24;
            const min = Math.min(...data), max = Math.max(...data);
            const range = max - min || 1;
            
            const points = data.map((v, i) => {
                const x = (i / (data.length - 1)) * width;
                const y = height - ((v - min) / range) * height;
                return `${x},${y}`;
            }).join(' ');
            
            const color = isUp ? '#34d399' : '#f87171';
            
            return `
                <div class="stock-sparkline">
                    <svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">
                        <polyline fill="none" stroke="${color}" stroke-width="2" points="${points}" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
            `;
        }

        function switchTab(region) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(content => content.style.display = 'none');
            document.getElementById(`tab-${region}`).style.display = 'block';
        }

        loadData();
    </script>
</body>
</html>
